server {
    listen 80;
    server_name 43.205.237.197;

    # ── Django / Gunicorn ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── IRG Chain 888101 public JSON-RPC (read-only) ───────────────────────────
    # Exposes the Besu node so the frontend and external tools can read chain state.
    # Only safe read methods should be allowed; write methods go through the
    # authenticated middleware service, not here.
    location /rpc {
        proxy_pass         http://127.0.0.1:8545;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 30;

        # Allow CORS from IRG domains
        add_header 'Access-Control-Allow-Origin' 'https://irggdp.web.app' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Static / media (whitenoise handles static, but nginx serves media) ─────
    location /media/ {
        alias /home/ec2-user/irg_gdp/backend/media/;
    }

    location /static/ {
        alias /home/ec2-user/irg_gdp/backend/staticfiles/;
    }
}
