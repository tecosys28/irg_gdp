# IRG GDP — EC2 nginx config
# SSL is terminated by Firebase Hosting (irggdp.com → Firebase CDN → this server).
# EC2 only needs HTTP on port 80; all traffic arriving here is already over HTTPS
# from the client's perspective (Firebase adds the TLS layer).
server {
    listen 80;
    server_name irggdp.com www.irggdp.com 43.205.237.197;

    client_max_body_size 20M;

    # Django API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # IRG Chain 888101 read-only JSON-RPC (internal use only)
    location /rpc {
        proxy_pass         http://127.0.0.1:8545;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 30;

        add_header 'Access-Control-Allow-Origin'  'https://irggdp.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type'       always;

        if ($request_method = OPTIONS) { return 204; }
    }

    # Django static and media files
    location /media/ {
        alias /home/ec2-user/irg_gdp/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /home/ec2-user/irg_gdp/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
